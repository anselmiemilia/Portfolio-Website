    <script src="scripts/lightbox.js"></script>
    <script>
        document.querySelectorAll('.kunst-tab').forEach(function (tab) {
            tab.addEventListener('click', function () {
                document.querySelectorAll('.kunst-tab').forEach(function (t) { t.classList.remove('active'); });
                document.querySelectorAll('.kunst-content').forEach(function (c) { c.classList.remove('active'); });
                tab.classList.add('active');
                document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
            });
        });
    </script>
